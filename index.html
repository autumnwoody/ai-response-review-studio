<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Response Review Studio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0f172a;
      color: white;
      margin: 0;
      padding: 20px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .container {
      max-width: 900px;
      margin: auto;
    }

    .box {
      background: #1e293b;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 100px;
      margin-top: 8px;
      border-radius: 6px;
      border: none;
      padding: 10px;
      font-size: 14px;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 10px 15px;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 10px;
      font-weight: bold;
    }

    button:hover {
      background: #0ea5e9;
    }

    .results {
      margin-top: 20px;
      padding: 15px;
      background: #0b1220;
      border-radius: 10px;
    }

    .score {
      margin: 5px 0;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>🤖 AI Response Review Studio</h1>

    <div class="box">
      <h3>Prompt</h3>
      <textarea id="prompt"></textarea>
    </div>

    <div class="box">
      <h3>Response A</h3>
      <textarea id="responseA"></textarea>
    </div>

    <div class="box">
      <h3>Response B</h3>
      <textarea id="responseB"></textarea>
    </div>

    <button onclick="evaluate()">Evaluate Responses</button>

    <div class="results" id="results" style="display:none;">
      <h3>Results</h3>
      <p class="score" id="winner"></p>
      <p class="score" id="notes"></p>
    </div>

  </div>

  <script>
    function evaluate() {
      const a = document.getElementById("responseA").value;
      const b = document.getElementById("responseB").value;

      const scoreA = a.length;
      const scoreB = b.length;

      let winner = "";

      if (scoreA > scoreB) {
        winner = "Response A is longer (not necessarily better, just more detailed).";
      } else if (scoreB > scoreA) {
        winner = "Response B is longer (not necessarily better, just more detailed).";
      } else {
        winner = "Both responses are similar in length.";
      }

      document.getElementById("results").style.display = "block";
      document.getElementById("winner").innerText = winner;
      document.getElementById("notes").innerText =
        "This is a basic evaluation model. Next step: we’ll upgrade it into real scoring (clarity, accuracy, helpfulness).";
    }
  </script>

</body>
</html>
