<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Response Review Studio</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial;
      background: radial-gradient(circle at top, #0b1220, #070b14);
      color: #e5e7eb;
    }

    .hero {
      text-align: center;
      padding: 70px 20px 30px;
    }

    .hero h1 {
      font-size: 40px;
      color: #38bdf8;
      margin-bottom: 10px;
    }

    .hero p {
      max-width: 650px;
      margin: auto;
      color: #94a3b8;
      line-height: 1.5;
    }

    .app {
      max-width: 900px;
      margin: auto;
      padding: 30px 20px 80px;
    }

    .card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 12px;
      background: #0f172a;
      color: white;
      resize: vertical;
    }

    button {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      font-weight: 800;
      cursor: pointer;
      color: #0b1220;
      margin-top: 10px;
    }

    button:hover {
      transform: translateY(-1px);
    }

    .result-card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 16px;
      margin-top: 12px;
    }

    .bar-bg {
      width: 100%;
      height: 10px;
      background: #1f2937;
      border-radius: 999px;
      overflow: hidden;
      margin-top: 6px;
    }

    .bar-fill {
      height: 10px;
      width: 0%;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      transition: width 0.5s ease;
    }
  </style>
</head>

<body>

  <div class="hero">
    <h1>🤖 AI Response Review Studio</h1>
    <p>Compare two AI responses using scoring for relevance, clarity, and structure.</p>
  </div>

  <div class="app">

    <div class="card">
      <h3>Prompt</h3>
      <textarea id="prompt"></textarea>
    </div>

    <div class="card">
      <h3>Response A</h3>
      <textarea id="responseA"></textarea>
    </div>

    <div class="card">
      <h3>Response B</h3>
      <textarea id="responseB"></textarea>
    </div>

    <button onclick="evaluate()">Run Evaluation</button>

    <div class="result-card">
      <h3>Winner</h3>
      <p id="winner">—</p>
    </div>

    <div class="result-card">
      <h3>Summary</h3>
      <p id="summary">—</p>
    </div>

    <div class="result-card">
      <h3>Response A</h3>
      <div class="bar-bg"><div class="bar-fill" id="barA"></div></div>
    </div>

    <div class="result-card">
      <h3>Response B</h3>
      <div class="bar-bg"><div class="bar-fill" id="barB"></div></div>
    </div>

  </div>

  <script>
    function score(text, prompt) {
      const words = text.trim().split(/\s+/).filter(Boolean);
      const length = Math.min(words.length / 2, 10);

      const pWords = prompt.toLowerCase().split(/\s+/);
      const t = text.toLowerCase();

      let match = 0;
      pWords.forEach(w => {
        if (w.length > 3 && t.includes(w)) match++;
      });

      const relevance = Math.min(match * 2, 10);

      const structure =
        text.includes(".") ||
        text.includes(",") ||
        text.includes("-")
          ? 7
          : 4;

      return (length * 0.3) + (relevance * 0.4) + (structure * 0.3);
    }

    function setBar(id, value) {
      document.getElementById(id).style.width = (value / 10) * 100 + "%";
    }

    function evaluate() {
      const prompt = document.getElementById("prompt").value || "";
      const a = document.getElementById("responseA").value || "";
      const b = document.getElementById("responseB").value || "";

      const A = score(a, prompt);
      const B = score(b, prompt);

      document.getElementById("winner").innerText =
        A > B ? "Response A Wins 🥇"
        : B > A ? "Response B Wins 🥇"
        : "Tie 🤝";

      document.getElementById("summary").innerText =
        "Evaluation based on relevance, clarity, and structure.";

      setBar("barA", A);
      setBar("barB", B);
    }
  </script>

</body>
</html>
