<style>
button.main {
  background: linear-gradient(135deg, #38bdf8, #0ea5e9);
  border: none;
  padding: 12px 18px;
  border-radius: 12px;
  font-weight: 800;
  cursor: pointer;
  margin-top: 10px;

  /* readability fix */
  color: #0b1220;
  letter-spacing: 0.3px;

  /* SaaS look */
  box-shadow: 0 10px 25px rgba(14, 165, 233, 0.25);
  transition: all 0.2s ease;
}

button.main:hover {
  transform: translateY(-1px);
  box-shadow: 0 14px 30px rgba(14, 165, 233, 0.35);
}

button.main:active {
  transform: translateY(0px);
}

button.main:disabled {
  opacity: 0.6;
  cursor: not-allowed;
  transform: none;
}
</style>

<script>
function evaluate() {
  const btn = document.querySelector("button.main");

  btn.disabled = true;
  btn.innerText = "Evaluating...";

  setTimeout(() => {
    const prompt = document.getElementById("prompt").value || "";
    const a = document.getElementById("responseA").value || "";
    const b = document.getElementById("responseB").value || "";

    const A = scoreDetails(a, prompt);
    const B = scoreDetails(b, prompt);

    document.getElementById("winner").innerText =
      A.total > B.total ? "Response A Wins 🥇"
      : B.total > A.total ? "Response B Wins 🥇"
      : "Tie 🤝";

    document.getElementById("summary").innerText =
      "Evaluation based on relevance, clarity, and structure scoring.";

    setBar("barA", A.total);
    setBar("barB", B.total);

    document.getElementById("scoreA").innerText =
      `Relevance: ${A.relevanceScore.toFixed(1)} | Clarity: ${A.lengthScore.toFixed(1)} | Structure: ${A.structure.toFixed(1)} | Total: ${A.total.toFixed(1)}`;

    document.getElementById("scoreB").innerText =
      `Relevance: ${B.relevanceScore.toFixed(1)} | Clarity: ${B.lengthScore.toFixed(1)} | Structure: ${B.structure.toFixed(1)} | Total: ${B.total.toFixed(1)}`;

    btn.disabled = false;
    btn.innerText = "Run Evaluation";
  }, 600);
}
</script>
