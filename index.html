<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Evaluation Studio</title>

  <style>
    body {
      margin: 0;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
      background: radial-gradient(circle at top, #0b1220, #070b14);
      color: #e5e7eb;
    }

    /* NAV BAR */
    .nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 14px 20px;
      background: rgba(17, 24, 39, 0.7);
      border-bottom: 1px solid rgba(148, 163, 184, 0.15);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
    }

    .nav-title {
      font-weight: 700;
      color: #38bdf8;
    }

    .nav button {
      background: #38bdf8;
      border: none;
      padding: 8px 12px;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
    }

    .container {
      max-width: 920px;
      margin: auto;
      padding: 30px 20px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 14px;
      backdrop-filter: blur(10px);
    }

    textarea {
      width: 100%;
      height: 120px;
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.2);
      padding: 12px;
      font-size: 14px;
      background: #0f172a;
      color: white;
      resize: vertical;
    }

    button.main {
      background: linear-gradient(135deg, #38bdf8, #0ea5e9);
      border: none;
      padding: 12px 18px;
      border-radius: 12px;
      cursor: pointer;
      font-weight: 700;
      color: #0b1220;
      margin-top: 10px;
    }

    /* RESULTS */
    .results {
      margin-top: 25px;
    }

    .result-card {
      background: rgba(17, 24, 39, 0.85);
      border: 1px solid rgba(148, 163, 184, 0.15);
      border-radius: 16px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .label {
      font-size: 12px;
      color: #94a3b8;
      margin-bottom: 6px;
    }

    .value {
      font-size: 16px;
      font-weight: 600;
      margin-bottom: 10px;
    }

    /* SCORE BAR */
    .bar-bg {
      width: 100%;
      height: 10px;
      background: #1f2937;
      border-radius: 999px;
      overflow: hidden;
    }

    .bar-fill {
      height: 10px;
      background: linear-gradient(90deg, #38bdf8, #0ea5e9);
      width: 0%;
      transition: width 0.5s ease;
    }

    .score-text {
      font-size: 12px;
      color: #94a3b8;
      margin-top: 6px;
    }
  </style>
</head>

<body>

  <div class="nav">
    <div class="nav-title">🤖 AI Evaluation Studio</div>
    <button onclick="location.reload()">New Evaluation</button>
  </div>

  <div class="container">

    <div class="subtitle">
      Compare AI responses using structured evaluation scoring
    </div>

    <div class="card">
      <h3>Prompt</h3>
      <textarea id="prompt"></textarea>
    </div>

    <div class="card">
      <h3>Response A</h3>
      <textarea id="responseA"></textarea>
    </div>

    <div class="card">
      <h3>Response B</h3>
      <textarea id="responseB"></textarea>
    </div>

    <button class="main" onclick="evaluate()">Run Evaluation</button>

    <div class="results">

      <div class="result-card">
        <div class="label">Winner</div>
        <div class="value" id="winner">—</div>
      </div>

      <div class="result-card">
        <div class="label">Analysis</div>
        <div class="value" id="summary">Run an evaluation to see results</div>
      </div>

      <div class="result-card">
        <div class="label">Response A Score</div>
        <div class="bar-bg"><div class="bar-fill" id="barA"></div></div>
        <div class="score-text" id="scoreA">0 / 10</div>
      </div>

      <div class="result-card">
        <div class="label">Response B Score</div>
        <div class="bar-bg"><div class="bar-fill" id="barB"></div></div>
        <div class="score-text" id="scoreB">0 / 10</div>
      </div>

    </div>

  </div>

  <script>
    function score(text, prompt) {
      const words = text.trim().split(/\s+/).filter(Boolean);
      const length = Math.min(words.length / 2, 10);

      const pWords = prompt.toLowerCase().split(/\s+/);
      const t = text.toLowerCase();

      let match = 0;
      pWords.forEach(w => {
        if (w.length > 3 && t.includes(w)) match++;
      });

      const relevance = Math.min(match * 2, 10);

      const structure =
        text.includes(".") || text.includes("-") || text.includes(",")
          ? 7
          : 4;

      return (length * 0.3) + (relevance * 0.4) + (structure * 0.3);
    }

    function setBar(id, value) {
      const percent = (value / 10) * 100;
      document.getElementById(id).style.width = percent + "%";
    }

    function evaluate() {
      const prompt = document.getElementById("prompt").value || "";
      const a = document.getElementById("responseA").value || "";
      const b = document.getElementById("responseB").value || "";

      const sA = score(a, prompt);
      const sB = score(b, prompt);

      let winner = "";
      let summary = "";

      if (sA > sB) {
        winner = "Response A Wins";
        summary = "A performed better based on relevance and structure.";
      } else if (sB > sA) {
        winner = "Response B Wins";
        summary = "B performed better based on clarity and completeness.";
      } else {
        winner = "Tie";
        summary = "Both responses are evenly matched.";
      }

      document.getElementById("winner").innerText = winner;
      document.getElementById("summary").innerText = summary;

      document.getElementById("scoreA").innerText = sA.toFixed(1) + " / 10";
      document.getElementById("scoreB").innerText = sB.toFixed(1) + " / 10";

      setBar("barA", sA);
      setBar("barB", sB);
    }
  </script>

</body>
</html>
