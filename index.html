<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>AI Response Review Studio</title>

  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0b1220;
      color: #e5e7eb;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 900px;
      margin: auto;
      padding: 30px;
    }

    h1 {
      color: #38bdf8;
      margin-bottom: 5px;
    }

    .subtitle {
      color: #94a3b8;
      margin-bottom: 25px;
    }

    .card {
      background: #111827;
      border: 1px solid #1f2937;
      border-radius: 12px;
      padding: 15px;
      margin-bottom: 15px;
    }

    textarea {
      width: 100%;
      height: 110px;
      margin-top: 8px;
      border-radius: 8px;
      border: none;
      padding: 10px;
      font-size: 14px;
      background: #0f172a;
      color: white;
    }

    button {
      background: #38bdf8;
      border: none;
      padding: 12px 18px;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      margin-top: 10px;
    }

    button:hover {
      background: #0ea5e9;
    }

    .results {
      margin-top: 20px;
      background: #111827;
      border-radius: 12px;
      padding: 15px;
      border: 1px solid #1f2937;
    }
  </style>
</head>

<body>
  <div class="container">

    <h1>🤖 AI Response Review Studio</h1>
    <div class="subtitle">Evaluate and compare AI-generated responses</div>

    <div class="card">
      <h3>Prompt</h3>
      <textarea id="prompt"></textarea>
    </div>

    <div class="card">
      <h3>Response A</h3>
      <textarea id="responseA"></textarea>
    </div>

    <div class="card">
      <h3>Response B</h3>
      <textarea id="responseB"></textarea>
    </div>

    <button onclick="evaluate()">Evaluate Responses</button>

    <div class="results" id="results" style="display:none;">
      <h3>Results</h3>
      <p id="winner"></p>
      <p id="summary"></p>
    </div>

  </div>

  <script>
    function evaluate() {
      const a = document.getElementById("responseA").value;
      const b = document.getElementById("responseB").value;

      // fake “smart” scoring (we’ll improve next step)
      const scoreA = Math.random() * 10;
      const scoreB = Math.random() * 10;

      let winner = "";
      let summary = "";

      if (scoreA > scoreB) {
        winner = "Response A performs better overall.";
        summary = "A shows stronger clarity and instruction alignment.";
      } else if (scoreB > scoreA) {
        winner = "Response B performs better overall.";
        summary = "B shows stronger detail and completeness.";
      } else {
        winner = "Both responses are evenly matched.";
        summary = "No clear winner based on current evaluation.";
      }

      document.getElementById("results").style.display = "block";
      document.getElementById("winner").innerText = winner;
      document.getElementById("summary").innerText = summary;
    }
  </script>

</body>
</html>
