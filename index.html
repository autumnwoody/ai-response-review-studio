<script>
  function scoreResponse(text, prompt) {
    const words = text.trim().split(/\s+/).filter(Boolean);
    const lengthScore = Math.min(words.length / 2, 10); // caps at 10

    // keyword overlap with prompt
    const promptWords = prompt.toLowerCase().split(/\s+/);
    const textLower = text.toLowerCase();

    let matchCount = 0;
    promptWords.forEach(word => {
      if (word.length > 3 && textLower.includes(word)) {
        matchCount++;
      }
    });

    const relevanceScore = Math.min(matchCount * 2, 10);

    // structure bonus (simple heuristic)
    const hasStructure =
      text.includes(".") ||
      text.includes(",") ||
      text.includes("•") ||
      text.includes("-");

    const structureScore = hasStructure ? 7 : 4;

    // final weighted score
    return (lengthScore * 0.3) + (relevanceScore * 0.4) + (structureScore * 0.3);
  }

  function evaluate() {
    const prompt = document.getElementById("prompt").value || "";
    const a = document.getElementById("responseA").value || "";
    const b = document.getElementById("responseB").value || "";

    const scoreA = scoreResponse(a, prompt);
    const scoreB = scoreResponse(b, prompt);

    let winner = "";
    let summary = "";

    if (scoreA > scoreB) {
      winner = `Response A wins (${scoreA.toFixed(1)} vs ${scoreB.toFixed(1)})`;
      summary = "Response A scored higher based on relevance, structure, and completeness.";
    } else if (scoreB > scoreA) {
      winner = `Response B wins (${scoreB.toFixed(1)} vs ${scoreA.toFixed(1)})`;
      summary = "Response B scored higher based on relevance, structure, and completeness.";
    } else {
      winner = "It's a tie";
      summary = "Both responses performed similarly across evaluation metrics.";
    }

    document.getElementById("results").style.display = "block";
    document.getElementById("winner").innerText = winner;
    document.getElementById("summary").innerText = summary;
  }
</script>
